<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="star1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="star2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Decorative stars -->
  <circle cx="80" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="430" cy="120" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="100" cy="400" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="400" cy="380" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="60" r="1.8" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="450" r="2.2" fill="#fff" opacity="0.6"/>
  
  <!-- Main star -->
  <path fill="url(#star1)" filter="url(#glow)" d="M256 100l55.5 112.4 124 18-89.7 87.5 21.2 123.6L256 384l-111 57.5 21.2-123.6-89.7-87.5 124-18L256 100z"/>
  
  <!-- Inner decoration -->
  <path fill="url(#star2)" opacity="0.6" d="M256 160l33.3 67.4 74.4 10.8-53.9 52.5 12.7 74.2L256 330l-66.5 35 12.7-74.2-53.9-52.5 74.4-10.8L256 160z"/>
  
  <!-- Center sparkle -->
  <circle cx="256" cy="256" r="20" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="256" r="10" fill="#ff6b9d"/>
</svg>
